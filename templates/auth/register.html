<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 我的博客</title>
    <link rel="stylesheet" href="{% static 'bootstrap5/bootstrap.min.css' %}">
    <style>
        body {
            background-color: #f5f5f5;
        }
        .register-container {
            max-width: 450px;
            margin: 80px auto;
        }
    </style>
</head>
<body>

<div class="container register-container">
    <div class="card shadow-sm">
        <div class="card-header bg-white">
            <h3 class="text-center mb-0">注册</h3>
        </div>
        <div class="card-body p-4">
            
            <form method="POST" novalidate>
                {% csrf_token %}

                {# 用户名 #}
                <div class="mb-3">
                    <label for="{{ form.username.id_for_label }}">{{ form.username.label }}</label>
                    {{ form.username }}
                    <div class="custom-error text-danger small mt-1"
                         id="id_username-error"
                         data-backend-error="{{ form.username.errors.0 }}">
                    </div>
                </div>
                
                {# 密码 #}
                <div class="mb-3">
                    <label for="{{ form.password.id_for_label }}">{{ form.password.label }}</label>
                    {{ form.password }}
                    <div class="custom-error text-danger small mt-1"
                         id="id_password-error"
                         data-backend-error="{{ form.password.errors.0 }}">
                    </div>
                </div>
                
                {# 确认密码 #}
                <div class="mb-3">
                    <label for="{{ form.confirm_password.id_for_label }}">{{ form.confirm_password.label }}</label>
                    {{ form.confirm_password }}
                    <div class="custom-error text-danger small mt-1"
                         id="id_confirm_password-error"
                         data-backend-error="{{ form.confirm_password.errors.0 }}">
                    </div>
                </div>
                
                {# 注册按钮 #}
                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-primary">注册</button>
                </div>
                
                {# 登录链接 #}
                <div class="text-center mb-3">
                    <span>已有账号？</span>
                    <a href="{% url 'blogAuth:login' %}" class="text-decoration-none">去登录</a>
                </div>
                
                {# 返回首页 #}
                <div class="text-center">
                    <a href="{% url 'blog:index' %}" class="btn btn-link text-decoration-none">返回首页</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="{% static 'bootstrap5/bootstrap.bundle.min.js' %}"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // 1. 页面加载时，优先显示后端返回的错误（如：用户名已存在、密码不一致）
        // 这样用户能看到上一次提交后服务器返回的提示
        document.querySelectorAll('.custom-error').forEach(div => {
            const backendError = div.getAttribute('data-backend-error');
            if (backendError) {
                div.textContent = backendError;
            }
        });

        // 2. 表单提交拦截逻辑（前端验证）
        document.querySelectorAll('form').forEach(form => {
            form.addEventListener('submit', function(e) {
                let isValid = true;
                const inputs = this.querySelectorAll('input[required]');
                
                inputs.forEach(input => {
                    const errorDiv = document.getElementById(input.id + '-error');
                    if (errorDiv) errorDiv.textContent = ''; // 点击提交时先清空所有提示
                    
                    const label = input.previousElementSibling ? input.previousElementSibling.textContent : '此字段';
                    
                    // 验证非空
                    if (input.hasAttribute('required') && !input.value.trim()) {
                        if (errorDiv) errorDiv.textContent = '输入' + label + '不能为空';
                        isValid = false;
                    }
                    // 验证最小长度
                    else if (input.hasAttribute('minlength') && input.value.length < input.getAttribute('minlength')) {
                        if (errorDiv) errorDiv.textContent = label + '长度不能小于 ' + input.getAttribute('minlength') + ' 个字符';
                        isValid = false;
                    }
                });

                // 如果前端验证失败，阻止提交（不刷新页面）
                if (!isValid) e.preventDefault();
            });
        });

        // 3. 用户输入时，自动清除该字段的错误提示
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', function() {
                const errorDiv = document.getElementById(this.id + '-error');
                if (errorDiv) errorDiv.textContent = '';
            });
        });
    });
</script>

</body>
</html>
