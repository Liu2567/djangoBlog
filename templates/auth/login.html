<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 我的博客</title>
    <link rel="stylesheet" href="{% static 'bootstrap5/bootstrap.min.css' %}">
    <style>
        body {
            background-color: #f5f5f5;
        }
        .login-container {
            max-width: 450px;
            margin: 100px auto;
        }
    </style>
</head>
<body>

<div class="container login-container">
    <div class="card shadow-sm">
        <div class="card-header bg-white">
            <h3 class="text-center mb-0">登录</h3>
        </div>
        <div class="card-body p-4">
            <form method="POST">
                {# 用户名 #}
                <div class="mb-3">
                    <label for="username" class="form-label">用户名</label>
                    <input type="text" class="form-control" id="username" name="username"
                           placeholder="请输入用户名" required>
                </div>

                {# 密码 #}
                <div class="mb-3">
                    <label for="password" class="form-label">密码</label>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="请输入密码" required>
                </div>

                {# 记住我 #}
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="remember" name="remember">
                    <label class="form-check-label" for="remember">记住我</label>
                </div>

                {# 登录按钮 #}
                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-primary">登录</button>
                </div>

                {# 注册链接 #}
                <div class="text-center mb-3">
                    <span>还没有账号？</span>
                    <a href="{% url 'blogAuth:register' %}" class="text-decoration-none">去注册</a>
                </div>

                {# 返回首页 #}
                <div class="text-center">
                    <a href="{% url 'blog:index' %}" class="btn btn-link text-decoration-none">返回首页</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="{% static 'bootstrap5/bootstrap.min.js' %}"></script>
</body>
</html>
