<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>我的博客</title>
    <link rel="stylesheet" href="{% static 'bootstrap5/bootstrap.min.css' %}">
    <script src="{% static 'bootstrap5/bootstrap.min.js' %}"></script>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    {# 引入wangeditor V5文本编辑器 #}
    <link href="https://unpkg.com/@wangeditor/editor@latest/dist/css/style.css" rel="stylesheet">
    <script src="https://unpkg.com/@wangeditor/editor@latest/dist/index.js"></script>
    <style>
        #editor-wrapper {
            border: 1px solid #ccc;
            z-index: 100;
        }
        #toolbar-container {
            border-bottom: 1px solid #ccc;
        }
    </style>
</head>
<body>
{#导航栏#}
<nav class="navbar navbar-expand-lg mb-3" style="background-color: #eaf1f6;" data-bs-theme="light">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">我的博客</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarColor03"
                aria-controls="navbarColor03" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarColor03">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="#">首页</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">发布博客</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">我的发布</a>
                </li>
            </ul>

            <form class="d-flex me-3" role="search">
                <input class="form-control" type="search" placeholder="请输入" aria-label="Search"
                       style="width: 200px; border-top-right-radius: 0; border-bottom-right-radius: 0;"/>
                <button class="btn btn-outline-primary" type="submit"
                        style="border-top-left-radius: 0; border-bottom-left-radius: 0;">搜索
                </button>
            </form>
            <div class="text-end">
                <button type="button" class="btn btn-outline-primary me-2">登录</button>
                <button type="button" class="btn btn-primary">注册</button>
            </div>


        </div>
    </div>
</nav>

{#主体部分#}
<div class="container" style="max-width: 1200px;">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h2 class="mb-4">发布博客</h2>

            <form action="" method="POST" id="blog-form">
                {# 标题输入 #}
                <div class="mb-3">
                    <label for="blog-title" class="form-label fw-bold">标题</label>
                    <input type="text" class="form-control" id="blog-title" name="title" placeholder="请输入标题">
                </div>

                {# 分类选择 #}
                <div class="mb-3">
                    <label for="blog-category" class="form-label fw-bold">分类</label>
                    <select class="form-select" id="blog-category" name="category">
                        <option selected>Python</option>
                        <option value="1">Java</option>
                        <option value="2">JavaScript</option>
                        <option value="3">前端</option>
                        <option value="4">数据库</option>
                        <option value="5">其他</option>
                    </select>
                </div>

                {# 内容编辑器 #}
                <div class="mb-3">
                    <label class="form-label fw-bold">内容</label>
                    <div id="editor-wrapper">
                        <div id="toolbar-container"></div>
                        <div id="editor-container" style="height: 400px;"></div>
                    </div>
                </div>

                {# 隐藏字段，用于提交编辑器内容 #}
                <input type="hidden" name="content" id="content">

                {# 提交按钮 #}
                <div class="text-end mt-4">
                    <button type="submit" class="btn btn-primary">提交</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    const { createEditor, createToolbar } = window.wangEditor

    const editorConfig = {
        placeholder: 'Type here...',
        onChange(editor) {
            const html = editor.getHtml()
            console.log('editor content', html)
            document.getElementById('content').value = html
        }
    }

    const editor = createEditor({
        selector: '#editor-container',
        html: '<p><br></p>',
        config: editorConfig,
        mode: 'default',
    })

    const toolbarConfig = {}

    const toolbar = createToolbar({
        editor,
        selector: '#toolbar-container',
        config: toolbarConfig,
        mode: 'default',
    })
</script>
</body>
</html>
