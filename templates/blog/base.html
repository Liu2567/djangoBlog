<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'bootstrap5/bootstrap.min.css' %}">
    <script src="{% static 'bootstrap5/bootstrap.min.js' %}"></script>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    {% block head %}{% endblock %}
</head>
<body>
{#导航栏#}
<nav class="navbar navbar-expand-lg mb-3" style="background-color: #eaf1f6;" data-bs-theme="light">
    <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'blog:index' %}">我的博客</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarColor03"
                aria-controls="navbarColor03" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarColor03">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="{% url 'blog:index' %}">首页</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'blog:blog_publish' %}">发布博客</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">我的发布</a>
                </li>
            </ul>

            <form class="d-flex me-3" role="search">
                <input class="form-control" type="search" placeholder="请输入" aria-label="Search"
                       style="width: 200px; border-top-right-radius: 0; border-bottom-right-radius: 0;"/>
                <button class="btn btn-outline-primary" type="submit"
                        style="border-top-left-radius: 0; border-bottom-left-radius: 0;">搜索
                </button>
            </form>
            <div class="text-end">
                <a href="{% url 'blogAuth:login' %}" class="btn btn-outline-primary me-2">登录</a>
                <a href="{% url 'blogAuth:register' %}" class="btn btn-primary">注册</a>
            </div>


        </div>
    </div>
</nav>

{#主体部分#}
<div class="container bg-white p-3 rounded">
    {% block content %}{% endblock %}
</div>

{% block script %}{% endblock %}
</body>
</html>
